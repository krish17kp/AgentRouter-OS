# AgentRouter OS — model registry (schema: MODEL_REGISTRY_SCHEMA.md)
# NOTE: model_id values are ILLUSTRATIVE PLACEHOLDERS. Routing logic never keys
# off a name — only off these fields. Edit this file to add/reprice/retire models.
models:
  # --- claude-code ----------------------------------------------------------
  - provider: claude-code
    model_id: frontier-coding-model
    display_name: Frontier Coding Model
    context_window: 200000
    max_output_tokens: 64000
    pricing_tier: frontier
    latency_tier: medium
    ability: { coding: 10, reasoning: 9, writing: 8 }
    tool_support: [tool-use, file-edit, shell]
    vision_support: true
    ideal_use_cases: [coding, analysis]
    avoid_use_cases: []
    deprecation_status: active
    fallback: [strong-coding-model, mid-tier-coding-model]
    source: manual
    last_updated: "2026-07-07"

  - provider: claude-code
    model_id: fast-coding-model
    display_name: Fast Coding Model
    context_window: 200000
    max_output_tokens: 32000
    pricing_tier: medium
    latency_tier: fast
    ability: { coding: 8, reasoning: 7, writing: 7 }
    tool_support: [tool-use, file-edit, shell]
    vision_support: true
    ideal_use_cases: [coding]
    deprecation_status: active
    fallback: [mid-tier-coding-model]
    source: manual
    last_updated: "2026-07-07"


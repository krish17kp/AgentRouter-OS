# AgentRouter OS — model registry (schema: MODEL_REGISTRY_SCHEMA.md)
#
# REAL current models. `vendor` is the model maker; `execution_targets` are the
# hosts that can actually run it (Claude Code, Codex CLI, vendor APIs). Ability
# scores are CURATED (ability_source: curated) with low/medium confidence — they
# are conservative human judgements, NOT measured benchmarks. Replace with
# benchmark-measured values (ability_source: benchmark) when evidence exists.
# Google + OpenRouter catalogs come from `agentrouter models refresh` (dynamic).
models:
  # ------------------------------------------------------------------ anthropic
  - provider: anthropic
    vendor: anthropic
    model_id: claude-fable-5
    display_name: Claude Fable 5
    family: fable
    release_channel: stable
    snapshot_type: alias
    context_window: 1000000
    max_output_tokens: 128000
    pricing_tier: frontier
    latency_tier: medium
    ability: { coding: 9, reasoning: 9, writing: 10 }
    ability_source: curated
    ability_confidence: 0.4
    tool_support: [tool-use, file-edit, shell]
    vision_support: true
    reasoning_support: true
    ideal_use_cases: [writing, analysis, coding]
    deprecation_status: active
    fallback: [claude-opus-4-8, claude-sonnet-5]
    execution_targets:
      - host: claude-code
        host_model_id: claude-fable-5
        execution_mode: cli
        command_template: ["claude", "-p", "--model", "claude-fable-5", "{prompt}"]
        required_command: claude
        supports_file_edit: true
        supports_shell: true
      - host: anthropic-api
        host_model_id: claude-fable-5
        execution_mode: api
        required_env: [ANTHROPIC_API_KEY]
    source: curated
    source_url_or_identifier: https://docs.anthropic.com/en/docs/about-claude/models
    last_updated: "2026-07-14"
    last_verified: "2026-07-14"


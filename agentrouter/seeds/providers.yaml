# AgentRouter OS — provider registry (PROVIDER_ADAPTER_SPEC.md)
# supports_execution ships false everywhere: `agentrouter execute` refuses to run
# until YOU flip it to true for a provider (M6 opt-in). exec_command is the argv
# template it runs; {prompt} is replaced with the generated prompt.
providers:
  - id: claude-code
    adapter: claude-code
    auth_model: oauth
    supports_execution: false
    exec_command: ["claude", "-p", "{prompt}"]
  - id: openai
    adapter: openai
    auth_model: api-key
    supports_execution: false
  - id: openrouter
    adapter: openrouter
    auth_model: api-key
    supports_execution: false
  - id: cursor
    adapter: cursor
    auth_model: oauth
    supports_execution: false
  - id: cli-agent
    adapter: cli-agent
    auth_model: local
    supports_execution: false
  - id: manual
    adapter: manual
    auth_model: manual
    supports_execution: false

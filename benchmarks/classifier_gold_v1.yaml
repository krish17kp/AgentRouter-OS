# AgentRouter OS — classifier gold benchmark v1
#
# Ground-truth labels are HUMAN expectations, not current classifier output.
# Each dimension accepts a list of acceptable labels; a prediction is correct
# when it lands in the set. Fields:
#   task_type   : subset of [coding, reasoning, writing, analysis, summarization, general]
#   complexity  : subset of [low, medium, high]
#   risk        : subset of [low, medium, high]
#   output_type : subset of [code, text, code+tests, data, plan]   (optional)
#   tools       : exact expected set from [file-edit, shell, vision, web]; [] = none (optional)
#   context_band: subset of [small, medium, large]                 (optional)
# approval is a deterministic function of risk (low->auto, medium->notify,
# high->human-approval-required) and is derived + graded automatically.

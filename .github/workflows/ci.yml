name: CI

on:
  push:
  pull_request:
  workflow_dispatch:  # manual trigger for the optional live-smoke job

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Tests + branch coverage gate (80%)
        run: pytest --cov=agentrouter --cov-branch

      - name: Classifier + routing quality gate (offline)
        run: python -m agentrouter evaluate --json --no-artifacts

      - name: CLI entrypoints smoke check
        run: |
          python -m agentrouter --help
          agentrouter --help

  # Windows parity: the project targets Windows first (dev machine), so prove
  # the suite and CLI work there too.
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests + branch coverage gate (80%)
        run: pytest --cov=agentrouter --cov-branch
      - name: CLI smoke check
        run: |
          python -m agentrouter --version
          python -m agentrouter evaluate --no-artifacts

  build-smoke:
    # Post-build verification: the artifact users actually pip-install works.
    # Catches packaging bugs (missing seeds, broken entrypoints) that editable
    # installs never hit.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install wheel into a clean venv and smoke-test it
        run: |
          python -m venv /tmp/wheelenv
          /tmp/wheelenv/bin/pip install dist/*.whl
          export AGENTROUTER_HOME=/tmp/arhome
          /tmp/wheelenv/bin/agentrouter --version
          /tmp/wheelenv/bin/agentrouter init
          /tmp/wheelenv/bin/agentrouter route "write a short haiku" --json > /tmp/route.json
          python -c "import json; d=json.load(open('/tmp/route.json')); assert d['recommendation'], d"
          /tmp/wheelenv/bin/agentrouter stats
          /tmp/wheelenv/bin/agentrouter registry list

  # Optional live provider smoke test — hits the real OpenRouter catalog.
  # Runs ONLY on manual dispatch, never on push/PR, and never blocks normal CI.
  live-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Live OpenRouter catalog refresh (keyless, public endpoint)
        run: |
          export AGENTROUTER_HOME=/tmp/live
          agentrouter init
          agentrouter providers refresh openrouter --limit 5 --dry-run
